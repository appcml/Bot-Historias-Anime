name: Bot Historias Anime

# ============================================
# HORARIOS: 15 historias por día
# ============================================

on:
  schedule:
    - cron: '0 8 * * *'        # 08:00
    - cron: '36 9 * * *'       # 09:36
    - cron: '12 11 * * *'      # 11:12
    - cron: '48 12 * * *'      # 12:48
    - cron: '24 14 * * *'      # 14:24
    - cron: '0 16 * * *'       # 16:00
    - cron: '36 17 * * *'      # 17:36
    - cron: '12 19 * * *'      # 19:12
    - cron: '48 20 * * *'      # 20:48
    - cron: '24 22 * * *'      # 22:24
    - cron: '0 0 * * *'        # 00:00
    - cron: '36 1 * * *'       # 01:36
    - cron: '12 3 * * *'       # 03:12
    - cron: '48 4 * * *'       # 04:48
    - cron: '24 6 * * *'       # 06:24
  
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bot-historias:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow python-dotenv
      
      - name: Crear directorio de datos
        run: mkdir -p data
      
      - name: Ejecutar Bot de Historias
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          INTERVALO_MINUTOS: 96
          MAX_HISTORIAS_DIA: 15
          DIAS_ATRAS: 30
        run: python bot_historias.py
      
      - name: Guardar historial
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/historial_historias.json || true
          git diff --staged --quiet || git commit -m "Update historial $(date +'%Y-%m-%d %H:%M')" || true
          git push || true
        continue-on-error: true

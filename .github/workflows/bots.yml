name: Bot Historias Anime

# ============================================
# CONFIGURACIÓN DE HORARIOS
# ============================================

on:
  schedule:
    # 15 historias por día = cada 96 minutos aprox
    # Horarios aproximados: 08:00, 09:36, 11:12, 12:48, 14:24, 
    #                        16:00, 17:36, 19:12, 20:48, 22:24, 
    #                        00:00, 01:36, 03:12, 04:48, 06:24
    - cron: '0 8 * * *'      # 08:00
    - cron: '36 9 * * *'     # 09:36
    - cron: '12 11 * * *'    # 11:12
    - cron: '48 12 * * *'    # 12:48
    - cron: '24 14 * * *'    # 14:24
    - cron: '0 16 * * *'     # 16:00
    - cron: '36 17 * * *'    # 17:36
    - cron: '12 19 * * *'    # 19:12
    - cron: '48 20 * * *'    # 20:48
    - cron: '24 22 * * *'    # 22:24
    - cron: '0 0 * * *'      # 00:00
    - cron: '36 1 * * *'     # 01:36
    - cron: '12 3 * * *'     # 03:12
    - cron: '48 4 * * *'     # 04:48
    - cron: '24 6 * * *'     # 06:24
  
  # Permitir ejecución manual desde GitHub
  workflow_dispatch:

# ============================================
# PERMISOS
# ============================================

permissions:
  contents: read

# ============================================
# TRABAJO
# ============================================

jobs:
  publicar-historia:
    runs-on: ubuntu-latest
    
    steps:
      # ---------------------------------------
      # 1. Checkout del código
      # ---------------------------------------
      - name: Checkout código
        uses: actions/checkout@v4
      
      # ---------------------------------------
      # 2. Setup Python
      # ---------------------------------------
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      # ---------------------------------------
      # 3. Instalar dependencias
      # ---------------------------------------
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow python-dotenv
      
      # ---------------------------------------
      # 4. Crear carpeta data
      # ---------------------------------------
      - name: Crear directorio de datos
        run: mkdir -p data
      
      # ---------------------------------------
      # 5. Ejecutar bot de historias
      # ---------------------------------------
      - name: Ejecutar Bot Historias
        env:
          # Variables de entorno desde GitHub Secrets
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          OPENROUTER_API_KEY

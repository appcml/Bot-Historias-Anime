name: Bots Anime - Posts y Historias

# ============================================
# HORARIOS DE EJECUCIÓN
# ============================================

on:
  schedule:
    # BOT DE POSTS NUEVOS - cada 60 minutos (24 posts/día máximo)
    - cron: '0 * * * *'        # Cada hora en punto
    
    # BOT DE HISTORIAS - 15 historias/día (cada 96 minutos)
    - cron: '0 8 * * *'        # 08:00
    - cron: '36 9 * * *'       # 09:36
    - cron: '12 11 * * *'      # 11:12
    - cron: '48 12 * * *'      # 12:48
    - cron: '24 14 * * *'      # 14:24
    - cron: '0 16 * * *'       # 16:00
    - cron: '36 17 * * *'      # 17:36
    - cron: '12 19 * * *'      # 19:12
    - cron: '48 20 * * *'      # 20:48
    - cron: '24 22 * * *'      # 22:24
    - cron: '0 0 * * *'        # 00:00
    - cron: '36 1 * * *'       # 01:36
    - cron: '12 3 * * *'       # 03:12
    - cron: '48 4 * * *'       # 04:48
    - cron: '24 6 * * *'       # 06:24
  
  # Ejecución manual desde GitHub
  workflow_dispatch:
    inputs:
      bot_a_ejecutar:
        description: '¿Qué bot ejecutar?'
        required: true
        default: 'ambos'
        type: choice
        options:
          - posts
          - historias
          - ambos

# ============================================
# PERMISOS
# ============================================

permissions:
  contents: write

# ============================================
# TRABAJOS
# ============================================

jobs:
  # -------------------------------------------
  # BOT DE POSTS NUEVOS (cada hora)
  # -------------------------------------------
  bot-posts:
    runs-on: ubuntu-latest
    # Solo ejecutar en horas en punto y si se selecciona manualmente
    if: |
      github.event.schedule == '0 * * * *' || 
      github.event.inputs.bot_a_ejecutar == 'posts' ||
      github.event.inputs.bot_a_ejecutar == 'ambos'
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser beautifulsoup4 Pillow python-dotenv
      
      - name: Crear directorio de datos
        run: mkdir -p data
      
      - name: Ejecutar Bot de Posts
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python bot_anime.py
      
      - name: Guardar historial
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ || true
          git diff --staged --quiet || git commit -m "Update: Bot posts $(date +'%Y-%m-%d %H:%M')" || true
          git push || true
        continue-on-error: true

  # -------------------------------------------
  # BOT DE HISTORIAS (15 veces al día)
  # -------------------------------------------
  bot-historias:
    runs-on: ubuntu-latest
    # Ejecutar solo en los horarios específicos de historias
    if: |
      (github.event.schedule != '0 * * * *' && github.event.schedule) ||
      github.event.inputs.bot_a_ejecutar == 'historias' ||
      github.event.inputs.bot_a_ejecutar == 'ambos'
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow python-dotenv
      
      - name: Crear directorio de datos
        run: mkdir -p data
      
      - name: Ejecutar Bot de Historias
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          INTERVALO_MINUTOS: 96
          MAX_HISTORIAS_DIA: 15
          DIAS_ATRAS: 30
        run: python bot_historias.py
      
      - name: Guardar historial
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/historial_historias.json || true
          git diff --staged --quiet || git commit -m "Update: Bot historias $(date +'%Y-%m-%d %H:%M')" || true
          git push || true
        continue-on-error: true
